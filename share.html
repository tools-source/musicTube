<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Open in MusicTube</title>
  <meta name="description" content="Open a shared song in MusicTube.">
  <style>
    :root {
      color-scheme: dark;
      --bg-top: #090911;
      --bg-bottom: #170611;
      --panel: rgba(255, 255, 255, 0.08);
      --panel-strong: rgba(255, 255, 255, 0.12);
      --border: rgba(255, 255, 255, 0.08);
      --text: #ffffff;
      --muted: rgba(255, 255, 255, 0.72);
      --accent: #ff3d6f;
      --accent-strong: #ff245d;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "SF Pro Display", "SF Pro Text", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top right, rgba(255, 61, 111, 0.22), transparent 28%),
        radial-gradient(circle at bottom left, rgba(41, 99, 255, 0.16), transparent 24%),
        linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
      padding: 24px;
    }

    .card {
      width: min(420px, 100%);
      padding: 24px;
      border-radius: 28px;
      border: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.06));
      backdrop-filter: blur(18px);
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.35);
    }

    .eyebrow {
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .track {
      display: grid;
      gap: 18px;
      justify-items: center;
      text-align: center;
    }

    .artwork {
      width: min(240px, 100%);
      aspect-ratio: 1;
      border-radius: 26px;
      object-fit: cover;
      background: var(--panel);
      border: 1px solid var(--border);
    }

    h1 {
      margin: 0;
      font-size: clamp(1.8rem, 5vw, 2.4rem);
      line-height: 1.02;
      letter-spacing: -0.04em;
    }

    .artist {
      margin: 6px 0 0;
      font-size: 1.02rem;
      color: var(--muted);
    }

    .actions {
      display: grid;
      gap: 12px;
      margin-top: 20px;
    }

    .button,
    .button-secondary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 54px;
      padding: 0 18px;
      border-radius: 999px;
      border: 1px solid transparent;
      font-size: 1rem;
      font-weight: 700;
      text-decoration: none;
      transition: transform 160ms ease, background-color 160ms ease, border-color 160ms ease;
    }

    .button {
      background: var(--accent);
      color: #fff;
    }

    .button-secondary {
      background: var(--panel-strong);
      border-color: var(--border);
      color: var(--text);
    }

    .button:hover,
    .button-secondary:hover {
      transform: translateY(-1px);
    }

    .hint {
      margin: 16px 0 0;
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.5;
      text-align: center;
    }

    .hint[data-state="opening"] {
      color: rgba(255, 255, 255, 0.9);
    }
  </style>
</head>
<body>
  <main class="card">
    <p class="eyebrow">Shared from MusicTube</p>
    <section class="track">
      <img id="artwork" class="artwork" alt="Track artwork" hidden>
      <div>
        <h1 id="title">MusicTube track</h1>
        <p id="artist" class="artist">Open this song in the app.</p>
      </div>
    </section>

    <div class="actions">
      <a id="open-app" class="button" href="/">Open in MusicTube</a>
      <a class="button-secondary" href="/">Back to MusicTube site</a>
    </div>

    <p id="hint" class="hint">
      If the app does not open automatically, tap the button above after installing MusicTube on your iPhone.
    </p>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const trackId = params.get("track") || params.get("video") || params.get("v") || "";
    const title = params.get("title") || "MusicTube track";
    const artist = params.get("artist") || "Open this song in the app.";
    const artwork = params.get("artwork") || "";

    document.getElementById("title").textContent = title;
    document.getElementById("artist").textContent = artist;

    const artworkEl = document.getElementById("artwork");
    if (artwork) {
      artworkEl.src = artwork;
      artworkEl.hidden = false;
    }

    const openURL = trackId ? `musictube://track/${encodeURIComponent(trackId)}` : "musictube://";
    document.getElementById("open-app").href = openURL;

    if (trackId) {
      const hint = document.getElementById("hint");
      hint.dataset.state = "opening";
      hint.textContent = "Trying to open MusicTube now…";

      window.setTimeout(() => {
        window.location.href = openURL;
      }, 120);

      window.setTimeout(() => {
        hint.dataset.state = "fallback";
        hint.textContent = "If MusicTube didn’t open, tap the button above. If it still doesn’t work, make sure the app is installed.";
      }, 1400);
    }
  </script>
</body>
</html>
